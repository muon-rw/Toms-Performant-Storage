modLoader="javafml"
loaderVersion="${forge_loader_version_range}"
issueTrackerURL = "https://github.com/${sources}/issues"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}+${minecraft_version}"
displayName="${mod_name}"
logoFile="${mod_id}.png"
logoBlur=false
authors="${mod_author}"
credits="${forge_mod_contributors}"
description='''
${mod_description}
'''

[[mixins]]
config = "${mod_id}.mixins.json"
[[mixins]]
config = "${mod_id}.forge.mixins.json"

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="${forge_loader_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${forge_minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="ftbteams"
mandatory=true
versionRange="[2001.0,)"
ordering="NONE"
side="BOTH"
